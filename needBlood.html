<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #ef4444;
        --color-secondary: #ff8080;
      }
    </style>
    <title>Blood Donation - Need Blood</title>
  </head>
  <body class="bg-secondary">
    <div id="container" class="min-h-screen flex flex-col">
      <!-- header -->
      <header class="bg-primary flex items-center justify-between py-3 px-6">
        <div class="w-9">
          <a href="./index.html" class="w-full">
            <img src="./logo.png" alt="logo" />
          </a>
        </div>
        <div
          id="toggle-menu"
          class="flex flex-col items-center gap-3 bg-primary font-bold absolute right-0 left-0 -top-100 py-2 px-4 sm:static sm:flex-row sm:gap-4 sm:py-0 sm:px-0 sm:bg-transparent"
        >
          <a href="./index.html">HOME </a>
          <a href="./registration.html">REGISTRATION </a>
          <a href="./needBlood.html"> NEED BLOOD </a>
          <a href="./about.html"> ABOUT </a>
        </div>
        <i id="toggle-button" class="fa-solid fa-bars text-lg sm:!hidden"></i>
      </header>
      <!-- main -->
      <div class="grow">
        <!-- blood need form -->
        <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md my-10">
          <h2 class="text-2xl font-bold mb-6 text-center text-primary">
            Need Blood?
          </h2>
          <form id="form">
            <div class="mb-4">
              <label for="name" class="block text-gray-700">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-red-200"
                required
              />
            </div>
            <div class="mb-4">
              <label for="email" class="block text-gray-700"
                >Email Address</label
              >
              <input
                type="email"
                id="email"
                name="email"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-red-200"
                required
              />
            </div>
            <div class="mb-4">
              <label for="phone" class="block text-gray-700"
                >Phone Number</label
              >
              <input
                type="tel"
                id="phone"
                name="phone"
                maxlength="10"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-red-200"
                required
              />
            </div>
            <div class="mb-4">
              <label for="address" class="block text-gray-700"
                >Your Address</label
              >
              <input
                type="text"
                id="address"
                name="address"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-red-200"
                required
              />
            </div>
            <div class="mb-4">
              <label for="bloodneed" class="block text-gray-700"
                >Blood Need</label
              >
              <select
                id="bloodneed"
                name="bloodneed"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-red-200"
                required
              >
                <option value="" disabled selected>Select Blood Type</option>
                <option value="A+">A+</option>
                <option value="A−">A−</option>
                <option value="B+">B+</option>
                <option value="B−">B−</option>
                <option value="AB+">AB+</option>
                <option value="AB−">AB−</option>
                <option value="O+">O+</option>
                <option value="O− ">O−</option>
              </select>
            </div>
            <button
              id="searchbtn"
              type="submit"
              class="w-full bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600 focus:outline-none focus:ring focus:ring-red-200"
            >
              Register
            </button>
          </form>
        </div>
      </div>
      <!-- footer -->
      <footer class="bg-gray-800 text-gray-200 py-4 text-center">
        <p>&copy; 2026 Blood Donation. All rights reserved.</p>
      </footer>
    </div>
    <script>
      const togglebtn = document.getElementById("toggle-button");
      const dropDown = document.getElementById("toggle-menu");

      togglebtn.addEventListener("click", function () {
        dropDown.classList.toggle("top-21");
      });
      const searchbtn = document.getElementById("searchbtn");
      searchbtn.addEventListener("click", function (e) {
        e.preventDefault();

        let bloodneed = document.getElementById("bloodneed").value;

        // sirf selected blood save karo
        localStorage.setItem("searchBlood", bloodneed);

        window.location.href = "./searchResults.html";
      });
    </script>
  </body>
</html>
